      };

        eyebrow: "La solución",
        title: "Síntesis conecta <em>cada número con su obra y su documento</em>.",

          { icon: ITrend,  eyebrow: "Avance vs plazo",       title: "Detectá desvíos a tiempo.", body: "Compará porcentaje de avance físico contra plazo transcurrido y encontrá las obras donde el tiempo corre más rápido que la obra — antes de que sea un problema de plata." },

            anchor: "Avance",

          <Hero
            variant="financiero"
            eyebrow="Certificados, avances y saldos por obra"

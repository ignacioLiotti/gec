<!doctype html>

  <title>Sintesis — Sistema operativo de obras | Dossier comercial</title>
  <meta name="description" content="Documentos, datos, alertas y equipo de cada obra en un solo lugar. Landing y dossier comercial de Síntesis, enfoque operativo." />
  <link rel="stylesheet" href="shared/sintesis-tokens.css" />
  <link rel="stylesheet" href="shared/landing.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

</head>
<body>
  <div id="root" data-screen-label="Landing - Operativo"></div>

  <script type="text/babel" src="shared/chrome.jsx"></script>
  <script type="text/babel" src="shared/sections.jsx"></script>

  <script type="text/babel">
    function App() {
      const stats = [
        { eyebrow: "Toda la obra", value: "1 lugar", label: "Documentos, datos, alertas y reportes de cada obra, juntos y conectados.", orange: true },
        { eyebrow: "Sin doble carga", value: "1 carga", label: "El documento se sube una vez; sus datos alimentan tablas, alertas y reportes solos." },
        { eyebrow: "Mismo equipo", value: "1 verdad", label: "Dirección, administración, obra y oficina técnica miran la misma información." },
      ];

      const problema = {
        eyebrow: "El problema",
        title: "La información de la obra existe. <em>Pero está repartida</em>.",
        lead: "Los contratos en una carpeta, las fotos en WhatsApp, los datos en Excel y los vencimientos en la memoria de alguien. Cuando hay que encontrar un documento o confirmar un dato, empieza la búsqueda — y cada búsqueda cuesta tiempo, y a veces plata.",
        ctaLabel: "Ver cómo lo ordena Síntesis",
        items: [
          { title: "Documentos difíciles de encontrar", body: "Contratos, pólizas, certificados, remitos y facturas quedan repartidos entre chats, mails, Drive y carpetas físicas. Nadie sabe cuál es la versión vigente." },
          { title: "Datos cargados dos veces", body: "Alguien lee el documento y vuelve a tipear los montos y fechas en una planilla. Cada doble carga es una oportunidad de error." },
          { title: "Vencimientos que avisan tarde", body: "Las pólizas y los plazos dependen de que alguien se acuerde de mirar la planilla. La alerta llega cuando ya venció." },
          { title: "Cada uno con su versión", body: "Obra tiene un número, administración otro y dirección un resumen viejo. Las reuniones se gastan en reconciliar versiones." },
        ],
      };

      const quick = {
        eyebrow: "La solución",
        title: "Un solo lugar para <em>la documentación y la operación</em> de tus obras.",
        lead: "Síntesis junta los documentos, los datos y las alertas que hoy viven repartidos entre Excel, Drive, WhatsApp y carpetas — y los mantiene conectados entre sí.",
        items: [
          { icon: IFolder, eyebrow: "Documentos por obra", title: "Todo en su carpeta.", body: "Contratos, pólizas, certificados, remitos y facturas quedan en la carpeta de su obra, con fecha, responsable y trazabilidad. Encontrar deja de ser buscar." },
          { icon: ISpark, eyebrow: "De documento a dato", title: "Sin recargar a mano.", body: "El sistema lee las fotos y PDFs que ya subís y extrae fechas, montos, proveedores y vencimientos. La planilla se completa sola — y registra de dónde salió cada dato." },
          { icon: IBell, eyebrow: "Alertas y seguimiento", title: "Nada se te pasa.", body: "Vencimientos, pendientes, recordatorios y notificaciones mantienen cada obra al día. El sistema avisa antes, no después." },

      };

      const anchored = {
        eyebrow: "Producto",
        title: "Cada obra, <em>ordenada y trazable</em>.",

          {
            anchor: "Documentos",
            title: "La obra junta <em>todos sus papeles</em>.",
            lead: "Cada obra reúne sus documentos, datos, certificados, reportes y pendientes en un mismo lugar. La cartera completa se lee en una tabla que se edita como un Excel.",

            mock: <ObrasOverview variant="operativo" />,
          },
          {
            anchor: "Extracción",
            title: "De la foto o el PDF <em>al dato</em>.",
            lead: "El sistema lee los documentos que subís, detecta de qué tipo son y completa fechas, montos, proveedores y vencimientos. Cada dato queda marcado con su origen: extraído, manual o mixto.",
            frame: "cool",
            mock: <AccionRapida />,
          },
          {
            anchor: "Alertas",
            title: "Vencimientos y pendientes <em>que avisan a tiempo</em>.",
            lead: "Cada obra tiene pendientes, calendario, recordatorios y alertas atadas a documentos por vencer o tareas sin cerrar. El seguimiento deja de depender de la memoria.",

            mock: <FlujoBoard />,
          },
          {
            anchor: "Equipo",
            title: "Quién ve y toca <em>cada parte</em>.",
            lead: "Roles y permisos por módulo, con excepciones por obra. La información queda donde corresponde sin frenar el trabajo del día a día — y cada cambio queda registrado.",
            frame: "dark",
            mock: <PermisosMatrix />,
          },
        ],
      };

      const perfiles = {
        eyebrow: "Para quién",
        title: "El mismo sistema, <em>visto desde cada rol</em>.",
        lead: "Síntesis no le pide a nadie que cambie su forma de trabajar: le da a cada rol su vista sobre la misma información.",

          {
            role: "Dirección",
            title: "El estado real, sin perseguirlo.",

        ],
      };

          { title: "Dirección controla", body: "Alertas, resúmenes y reportes muestran el estado real de cada obra y de la cartera — sin pedir el resumen ni esperarlo." },
        ],
      };

      const demo = {
        eyebrow: "Demo",
        title: "Recorré <em>una obra de punta a punta</em>.",
        lead: "Tres vistas reales, en orden: un documento que se vuelve dato, el sistema visto desde cada rol y la cartera completa.",
        tabs: [
          { tag: "Carga", title: "De documento a dato", body: "Subís un documento y ves cómo el sistema lo tipifica, extrae sus datos y los sincroniza con la tabla — sin recargar nada a mano." },
          { tag: "Equipo", title: "Cada uno ve lo suyo", body: "La vista cambia según el rol: probá cómo administración, obra y dirección ven navegación y datos distintos sobre la misma obra." },
          { tag: "Cartera", title: "Todas tus obras juntas", body: "El resumen ejecutivo: avance ponderado, riesgo por obra y los pendientes de toda la empresa en una pantalla." },
        ],
        demoMock: (i) => [<AccionRapida />, <VistaPorRol />, <CarteraDashboard />][i],
      };

      const modulos = {
        eyebrow: "Módulos",
        title: "Qué incluye, <em>módulo por módulo</em>.",
        lead: "El inventario completo de capacidades del enfoque operativo. Todos los módulos operan sobre las mismas obras y los mismos datos.",

            icon: IFolder, name: "Documentos por obra",
            desc: "Cada obra tiene sus carpetas: contratos, pólizas, certificados, remitos, facturas y planos, con fecha y responsable.",

          },
          {
            icon: ISpark, name: "Extracción de datos",
            desc: "El sistema lee fotos y PDFs, detecta el tipo de documento y extrae los datos clave para revisión.",
            bullets: ["Tipificación automática del documento", "Montos, fechas, proveedores, vencimientos", "Revisión y confirmación humana", "Origen del dato siempre visible"],

          {
            icon: IBell, name: "Alertas y pendientes",

          {
            icon: ITable, name: "Tablas tipo Excel",
            desc: "Los datos de obra se trabajan en tablas editables con la experiencia de planilla que tu equipo ya conoce.",
            bullets: ["Edición en celda, autocompletes", "Columnas configurables por empresa", "Filtros, búsqueda y orden", "Exportación a Excel y PDF"],

          {
            icon: IDoc, name: "Generación documental",
            desc: "Documentos nuevos se arman desde plantillas con los datos ya cargados, en vez de rehacerse desde cero.",
            bullets: ["Plantillas por tipo de documento", "Datos de la obra auto-completados", "Historial y revisión de generados", "Salida en PDF"],
          },
          {
            icon: IShield, name: "Roles y permisos",
            desc: "Quién ve y edita cada módulo se define por rol, con excepciones por obra y auditoría de cambios.",
            bullets: ["Permisos por módulo y rol", "Overrides por obra", "Registro de auditoría", "Datos separados por organización"],
          },
        ],
      };

        eyebrow: "Ficha técnica",
        title: "Lo que vas a querer saber <em>antes de la primera reunión</em>.",
        lead: "Las respuestas concretas sobre implementación, datos, seguridad y salida. Para compartir con administración, sistemas o quien decida.",
        rows: [
          { label: "Qué es", value: "Una plataforma web de gestión documental y operativa para constructoras: documentos, datos, alertas, tablas y reportes de cada obra en un solo lugar, con accesos por rol. <b>Ordena lo que tu equipo ya hace</b> — no lo obliga a cambiar de herramienta mental." },

          { label: "Carga inicial", value: "Los documentos existentes se suben a carpetas por obra (sirven los PDFs y fotos que ya tenés). Las tablas se importan desde tus planillas actuales. La extracción completa los datos clave para evitar la doble carga." },

          { label: "Seguridad de datos", value: "Arquitectura multi-empresa con datos completamente separados por organización. Accesos con usuario y contraseña, sesiones controladas y registro de auditoría de acciones administrativas." },

          { label: "Requisitos", value: "Solo un navegador — sin instalación ni servidores propios. La carga desde obra funciona desde cualquier celular. No requiere capacitación técnica: las tablas se editan como un Excel." },
          { label: "Acompañamiento", value: "Implementación asistida: configuración inicial, carga de la primera obra y capacitación por rol los hacemos con tu equipo. Soporte directo durante el piloto y después." },

      };

        eyebrow: "Empezar",
        title: "Ordená tus obras <em>empezando por una sola</em>.",
        steps: [
          { title: "Elegí una obra", body: "Arrancamos con una obra real, no con toda la empresa de golpe. El riesgo es bajo y el resultado se ve en semanas." },
          { title: "Cargá sus documentos", body: "Subimos los contratos, pólizas, certificados y papeles que ya tenés — tal como están, sin reordenarlos antes." },
          { title: "Convertilos en datos", body: "Activamos la extracción para que los documentos se vuelvan datos y alertas, y tu equipo solo revise y confirme." },
          { title: "Sumá al equipo", body: "Damos acceso a administración, obra y dirección, cada uno con su rol. La obra queda operando en el sistema." },
        ],
        ctaLight: "Probar en una obra 30 días",
        ctaGhost: "Ver demo con una obra real",
      };

      const split = {
        eyebrow: "Preguntas frecuentes",
        title: "Se adapta a cómo <em>ya trabajás</em>.",
        lead: "Síntesis ordena lo que tu equipo ya hace; no lo obliga a cambiar de golpe ni a abandonar sus Excel. Estas son las preguntas que más nos hacen en la primera reunión.",

        items: [
          { title: "¿Tengo que cambiar cómo trabaja el equipo?", body: "No. Mantienen búsquedas, tablas editables, autocompletes y exportaciones. Síntesis ordena eso y lo vuelve trazable — el cambio se siente como orden, no como sistema nuevo." },

          { title: "¿Cuánto lleva implementarlo?", body: "El piloto arranca con una obra en días. Los documentos se suben tal como están y el equipo se entrena por rol en sesiones cortas." },
          { title: "¿Sirve para varias obras y empresas?", body: "Sí. Cada organización tiene sus obras, sus accesos y sus datos completamente separados del resto. La estructura se define una vez y aplica a todas las obras." },
          { title: "¿Puedo sacar la información?", body: "Siempre. Documentos, tablas y reportes se exportan en cualquier momento a formatos abiertos. Los datos son de tu empresa, no nuestros." },
        ],
      };

      const cierre = {
        eyebrow: "La promesa",
        title: "Cada obra puede variar — <em>el control no</em>.",
        lead: "Síntesis le da a tu empresa una forma común de trabajar: cada obra puede tener sus particularidades, pero los documentos, los datos y el control se mantienen ordenados, trazables y a la vista de quien decide.",
        primary: "Ver demo con una obra real",
        secondary: "Probar en una obra 30 días",
      };

      return (
        <>
          <Nav variant="operativo" />
          <Hero
            variant="operativo"
            eyebrow="Documentación y operación de obra"
            title='Ordená documentos, datos y alertas de obra <em>en un solo lugar</em>.'
            lead="Síntesis centraliza la documentación de cada obra, extrae los datos desde fotos y PDFs, avisa de vencimientos y desvíos, y mantiene a administración, obra y dirección trabajando sobre la misma información."

            secondaryCta="Probar en una obra 30 días"
            trust={["Documentos por obra", "Extracción de datos", "Alertas y vencimientos", "Roles y permisos", "Exportable a Excel/PDF"]}
          />
          <DossierBar note="Guardala como PDF y compartila con quien decide: incluye el producto pantalla por pantalla, los módulos, la ficha técnica y el plan de arranque." />

          <Split {...problema} />
          <QuickReference {...quick} />
          <AnchoredFeatures {...anchored} />
          <Perfiles {...perfiles} />
          <Flujo {...flujo} />
          <DemoSection {...demo} />
          <ModuloCatalogo {...modulos} />
          <FichaTecnica {...ficha} />
          <DarkSteps {...darkSteps} />
          <Split {...split} />
          <Cierre {...cierre} />
          <Footer variant="operativo" />
        </>
      );

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <style id="__om-edit-overrides"></style>
</body>
</html>

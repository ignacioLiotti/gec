<link rel="stylesheet" href="design-system/colors_and_type.css"/>
<style>
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body { background: var(--background); }

  @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn    { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes dashflow { to { stroke-dashoffset: -16; } }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(28,25,23,.18); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(28,25,23,.32); border: 2px solid transparent; background-clip: padding-box; }

  button { font-family: var(--font-sans); }
</style>
</head>

<div id="root"></div>
